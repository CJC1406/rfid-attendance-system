{% extends "base.html" %}
{% block title %}Attendance{% endblock %}

{% block content %}
<div class="page-header d-flex align-c justify-b">
  <div>
    <h1 class="page-title">Attendance Records</h1>
    <p class="page-subtitle">View, edit and manage all attendance entries</p>
  </div>
  <button class="btn btn-primary" onclick="openModal('manual-modal')">✏️ Manual Mark</button>
</div>

<!-- Filters -->
<div class="card mb-2">
  <div class="toolbar" style="margin-bottom:0">
    <div class="form-group" style="margin:0;min-width:150px">
      <label class="form-label">From</label>
      <input type="date" id="att-from" class="form-control" onchange="loadAttendance()">
    </div>
    <div class="form-group" style="margin:0;min-width:150px">
      <label class="form-label">To</label>
      <input type="date" id="att-to" class="form-control" onchange="loadAttendance()">
    </div>
    <div class="form-group" style="margin:0;min-width:130px">
      <label class="form-label">Branch</label>
      <select id="att-branch" class="form-control" onchange="loadAttendance()">
        <option value="">All Branches</option>
        <option>CSE</option><option>ISE</option><option>ECE</option>
        <option>EEE</option><option>MECH</option><option>CIVIL</option>
      </select>
    </div>
    <div style="margin-top:auto">
      <button class="btn btn-primary" onclick="loadAttendance()">🔍 Filter</button>
    </div>
  </div>
</div>

<!-- Attendance Table -->
<div class="card" style="padding:0">
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Photo</th><th>Student</th><th>Branch</th>
          <th>Date</th><th>Time</th><th>Status</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="att-tbody">
        <tr><td colspan="7"><div class="empty-state"><span class="spinner"></span></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Manual mark modal -->
<div class="modal-overlay" id="manual-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Manual Attendance</h3>
      <button class="modal-close" onclick="closeModal('manual-modal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">RFID UID</label>
      <input type="text" id="manual-uid" class="form-control" placeholder="e.g. 63A91F2C">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" id="manual-date" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">Time</label>
        <input type="time" id="manual-time" class="form-control" value="09:00">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select id="manual-status" class="form-control">
        <option value="present">Present</option>
        <option value="late">Late</option>
        <option value="absent">Absent</option>
      </select>
    </div>
    <div class="d-flex gap-2 justify-b">
      <button class="btn btn-ghost" onclick="closeModal('manual-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="manualMark()">Mark Attendance</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Set default dates (last 7 days)
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().split('T')[0];
  const week  = new Date(Date.now() - 7*86400000).toISOString().split('T')[0];
  document.getElementById('att-from').value = week;
  document.getElementById('att-to').value   = today;
  document.getElementById('manual-date').value = today;
  loadAttendance();
});
</script>
{% endblock %}
