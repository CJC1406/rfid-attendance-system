{% extends "base.html" %}
{% block title %}Reports{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Reports & Export</h1>
  <p class="page-subtitle">Export attendance data as CSV or PDF</p>
</div>

<div class="grid-2">
  <!-- Export Card -->
  <div class="card">
    <h2 class="fw-700 mb-2" style="font-size:1rem">📤 Export Attendance</h2>

    <div class="form-group">
      <label class="form-label">From Date</label>
      <input type="date" id="exp-from" class="form-control">
    </div>
    <div class="form-group">
      <label class="form-label">To Date</label>
      <input type="date" id="exp-to" class="form-control">
    </div>

    <div class="d-flex gap-2 mt-3">
      <a id="csv-btn" href="#" class="btn btn-success w-100" onclick="exportFile('csv')">
        📊 Export CSV
      </a>
      <a id="pdf-btn" href="#" class="btn btn-danger w-100" onclick="exportFile('pdf')">
        📄 Export PDF
      </a>
    </div>
  </div>

  <!-- Summary card -->
  <div class="card">
    <h2 class="fw-700 mb-2" style="font-size:1rem">📋 Quick Summary</h2>
    <div id="summary-content">
      <div class="empty-state"><span class="spinner"></span></div>
    </div>
  </div>
</div>

<!-- Preview table -->
<div class="card mt-2" style="padding:0">
  <div style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border)">
    <h2 class="fw-700" style="font-size:1rem">📑 Preview</h2>
  </div>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr><th>Name</th><th>USN</th><th>Branch</th><th>Date</th><th>Time</th><th>Status</th></tr>
      </thead>
      <tbody id="preview-tbody">
        <tr><td colspan="6"><div class="empty-state"><span class="spinner"></span></div></td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const today = new Date().toISOString().split('T')[0];
  const week  = new Date(Date.now() - 7*86400000).toISOString().split('T')[0];
  document.getElementById('exp-from').value = week;
  document.getElementById('exp-to').value   = today;
  loadPreview();
  loadSummary();
});

async function loadPreview() {
  const from = document.getElementById('exp-from').value;
  const to   = document.getElementById('exp-to').value;
  const rows = await apiFetch(`/api/attendance?from=${from}&to=${to}`);
  const tbody = document.getElementById('preview-tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><p>No records in this range</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.slice(0, 50).map(r => `
    <tr>
      <td><strong>${r.name}</strong></td>
      <td><span class="text-muted">${r.usn}</span></td>
      <td>${r.branch || '—'}</td>
      <td>${fmtDate(r.date)}</td>
      <td>${r.time}</td>
      <td>${badgeHtml(r.status)}</td>
    </tr>`).join('');
}

async function loadSummary() {
  const stats = await apiFetch('/api/dashboard/stats');
  const el = document.getElementById('summary-content');
  el.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:.75rem">
      <div class="d-flex align-c justify-b"><span class="text-muted">Total Students</span><strong>${stats.total}</strong></div>
      <div class="d-flex align-c justify-b"><span class="text-muted">Present Today</span><strong style="color:var(--success)">${stats.present}</strong></div>
      <div class="d-flex align-c justify-b"><span class="text-muted">Late Today</span><strong style="color:var(--warning)">${stats.late}</strong></div>
      <div class="d-flex align-c justify-b"><span class="text-muted">Absent Today</span><strong style="color:var(--danger)">${stats.absent}</strong></div>
      <div class="progress-bar mt-1"><div class="progress-fill progress-success" style="width:${stats.percentage}%"></div></div>
      <div class="text-muted text-center" style="font-size:.8rem">${stats.percentage}% attendance today</div>
    </div>`;
}

function exportFile(type) {
  const from = document.getElementById('exp-from').value;
  const to   = document.getElementById('exp-to').value;
  window.location.href = `/api/export/${type}?from=${from}&to=${to}`;
}
</script>
{% endblock %}
