{% extends "base.html" %}
{% block title %}Students{% endblock %}

{% block content %}
<div class="page-header d-flex align-c justify-b">
  <div>
    <h1 class="page-title">Students</h1>
    <p class="page-subtitle">Manage registered students and RFID cards</p>
  </div>
  <button class="btn btn-primary" onclick="openAddStudent()">+ Add Student</button>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="student-search" class="form-control"
           placeholder="Search by name, USN or branch…">
  </div>
</div>

<!-- Student Table -->
<div class="card" style="padding:0">
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Photo</th>
          <th>Name</th>
          <th>USN</th>
          <th>Branch</th>
          <th>Year</th>
          <th>RFID UID</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="student-tbody">
        <tr><td colspan="7"><div class="empty-state"><span class="spinner"></span></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Add/Edit Student Modal -->
<div class="modal-overlay" id="student-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="student-modal-title">Add Student</h3>
      <button class="modal-close" onclick="closeModal('student-modal')">✕</button>
    </div>
    <form id="student-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">RFID UID *</label>
          <input type="text" id="f-uid" class="form-control" placeholder="e.g. 63A91F2C" required>
        </div>
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input type="text" id="f-name" class="form-control" placeholder="Student full name" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">USN *</label>
          <input type="text" id="f-usn" class="form-control" placeholder="e.g. 1SI22CS045" required>
        </div>
        <div class="form-group">
          <label class="form-label">Branch</label>
          <select id="f-branch" class="form-control">
            <option value="">Select branch</option>
            <option>CSE</option><option>ISE</option><option>ECE</option>
            <option>EEE</option><option>MECH</option><option>CIVIL</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Year</label>
          <select id="f-year" class="form-control">
            <option value="">Select year</option>
            <option>1st</option><option>2nd</option><option>3rd</option><option>4th</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Password (login)</label>
          <input type="password" id="f-password" class="form-control" placeholder="Leave blank to keep">
        </div>
      </div>
      <div class="d-flex gap-2 justify-b mt-3">
        <button type="button" class="btn btn-ghost" onclick="closeModal('student-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Student</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
