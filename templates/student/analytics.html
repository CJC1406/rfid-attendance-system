{% extends "base.html" %}
{% block title %}My Analytics{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">My Analytics</h1>
  <p class="page-subtitle">Your attendance trends and insights</p>
</div>

<div class="grid-2 mb-2">
  <div class="card">
    <h2 class="fw-700 mb-2" style="font-size:1rem">📈 Monthly Trend</h2>
    <canvas id="my-monthly-chart" height="240"></canvas>
  </div>

  <div class="card text-center">
    <h2 class="fw-700 mb-2" style="font-size:1rem">📊 Overall Split</h2>
    <canvas id="my-donut" height="240"></canvas>
  </div>
</div>

<!-- Insights -->
<div class="card">
  <h2 class="fw-700 mb-2" style="font-size:1rem">💡 Insights</h2>
  <div id="insights-grid" class="stats-grid" style="margin:0"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const analytics = await apiFetch('/api/my/analytics');

  buildMonthlyChart('my-monthly-chart', analytics.monthly || []);
  buildDonutChart('my-donut', analytics.present, analytics.late, analytics.absent);

  const pct    = analytics.percentage;
  const min    = analytics.min_pct;
  const status = pct >= min ? 'success' : pct >= 60 ? 'warning' : 'danger';
  const statusText = pct >= min ? '✅ On Track' : '⚠️ At Risk';

  document.getElementById('insights-grid').innerHTML = `
    <div class="stat-card ${status}">
      <div class="stat-icon">${pct >= min ? '🏆' : '⚠️'}</div>
      <div><div class="stat-value">${pct}%</div><div class="stat-label">${statusText}</div></div>
    </div>
    <div class="stat-card accent">
      <div class="stat-icon">📅</div>
      <div><div class="stat-value">${analytics.total_days}</div><div class="stat-label">Total Class Days</div></div>
    </div>
    <div class="stat-card ${analytics.needed === 0 ? 'success' : 'warning'}">
      <div class="stat-icon">🎯</div>
      <div><div class="stat-value">${analytics.needed === 999 ? '∞' : analytics.needed}</div>
           <div class="stat-label">Classes Needed (${min}%)</div></div>
    </div>
    <div class="stat-card warning">
      <div class="stat-icon">⏰</div>
      <div><div class="stat-value">${analytics.late}</div><div class="stat-label">Late Arrivals</div></div>
    </div>
  `;
});
</script>
{% endblock %}
